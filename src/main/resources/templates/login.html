<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Login — SelfShop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo .icon {
      width: 56px; height: 56px;
      background: #007bff;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .logo .icon svg { width: 28px; height: 28px; fill: white; }
    .logo h1 { font-size: 20px; color: #1a1a2e; font-weight: 700; }
    .logo p { font-size: 13px; color: #888; margin-top: 4px; }

    .alert {
      background: #fff3f3;
      border: 1px solid #f5c6cb;
      color: #721c24;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .success-alert {
      background: #f3fff3;
      border: 1px solid #c3e6cb;
      color: #155724;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: bold; color: #444; margin-bottom: 6px; }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
      transition: border-color 0.2s;
      outline: none;
    }
    input[type=text]:focus, input[type=password]:focus {
      border-color: #007bff;
      box-shadow: 0 0 0 3px rgba(0,123,255,0.12);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #0069d9; }

    .hint { text-align: center; font-size: 12px; color: #aaa; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 3a3 3 0 110 6 3 3 0 010-6zm5 12H7v-.6c0-2 4-3.1 5-3.1s5 1.1 5 3.1V18z"/></svg>
      </div>
      <h1>SelfShop</h1>
      <p>Sign in to continue</p>
    </div>

    <div class="alert" th:if="${param.error}">Invalid username or password.</div>
    <div class="success-alert" th:if="${param.logout}">You have been logged out.</div>

    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required autofocus/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
    <p class="hint">Default: admin / admin123</p>
  </div>
</body>
</html>
