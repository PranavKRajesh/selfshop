<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Invoice</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #f9f9f9; }
    .invoice-box { background: white; padding: 32px; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.1); }
    .header { display: flex; justify-content: space-between; border-bottom: 2px solid #333; padding-bottom: 16px; margin-bottom: 20px; }
    .header h2 { margin: 0; font-size: 28px; color: #333; }
    .header .meta { text-align: right; font-size: 13px; color: #555; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    th, td { border: 1px solid #e0e0e0; padding: 10px 12px; font-size: 14px; }
    th { background: #f4f4f4; font-weight: bold; }
    .totals-table { width: 60%; margin-left: auto; }
    .totals-table td { border: none; padding: 6px 10px; font-size: 14px; }
    .totals-table .grand-total td { font-size: 16px; font-weight: bold; border-top: 2px solid #333; }
    .footer { margin-top: 30px; color: #888; font-size: 12px; text-align: center; border-top: 1px solid #eee; padding-top: 14px; }
    .actions { margin-top: 20px; display: flex; gap: 12px; }
    .btn { padding: 9px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
    .btn-primary { background: #007bff; color: white; }
    .btn-secondary { background: #6c757d; color: white; }
    @media print {
      body { background: white; }
      .actions, nav { display: none; }
      .invoice-box { box-shadow: none; }
    }
    nav { margin-bottom: 20px; }
    nav a { margin-right: 16px; font-weight: bold; color: #007bff; text-decoration: none; }
  </style>
</head>
<body>
  <nav><a href="/">← Back to products</a></nav>

  <div class="invoice-box">
    <div class="header">
      <div>
        <h2>INVOICE</h2>
        <div style="font-size:13px;color:#555;margin-top:6px;">Your Business Name</div>
      </div>
      <div class="meta">
        <div><strong>Invoice No:</strong> <span th:text="${invoiceNumber}"></span></div>
        <div><strong>Date:</strong> <span th:text="${#dates.format(#dates.createNow(), 'dd MMM yyyy')}"></span></div>
      </div>
    </div>

    <table>
      <tr><th>#</th><th>Product</th><th>Unit Price</th><th>Qty</th><th>Subtotal</th></tr>
      <tr th:each="item, stat : ${cart}">
        <td th:text="${stat.index + 1}"></td>
        <td th:text="${item.productName}"></td>
        <td th:text="'₹' + ${item.price}"></td>
        <td th:text="${item.qty}"></td>
        <td th:text="'₹' + ${item.total}"></td>
      </tr>
    </table>

    <table class="totals-table">
      <tr><td>Subtotal</td><td style="text-align:right" th:text="'₹' + ${subtotal}"></td></tr>
      <tr><td>GST (18%)</td><td style="text-align:right" th:text="'₹' + ${tax}"></td></tr>
      <tr class="grand-total"><td>Grand Total</td><td style="text-align:right" th:text="'₹' + ${total}"></td></tr>
    </table>

    <div class="footer">Thank you for your business!</div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="window.print()">Print / Save as PDF</button>
    <a href="/cart/clear"><button class="btn btn-secondary" type="button">New bill</button></a>
  </div>
</body>
</html>
